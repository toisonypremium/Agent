name: CI
on:
  push:
    branches: ["**"]
  pull_request:
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btc-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: btc-agent/go.mod
          cache-dependency-path: btc-agent/go.sum
      - run: test -z "$(gofmt -l .)"
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o /tmp/btc-agent .
      - run: ./scripts/check-secrets.sh
      - run: node --check web/app.js
      - run: node --check web/api.js
      - run: node web/test_dashboard_state.js
      - run: node web/test_dashboard_escape.js
      - run: node web/test_dashboard_contract.js
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client
      - name: Bootstrap Supabase-compatible roles
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          do $$ begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then create role anon nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
            if not exists (select 1 from pg_roles where rolname = 'service_role') then create role service_role nologin; end if;
          end $$;
          create schema if not exists auth;
          create table if not exists auth.users(id uuid primary key);
          SQL
      - name: Apply migrations
        working-directory: btc-agent
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: for f in supabase/migrations/0001_v2_read_model.sql supabase/migrations/20260721090000_llm_usage_read_model.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done
      - name: Verify migrations
        working-directory: btc-agent
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: for f in supabase/migrations/verify_v2_read_model.sql supabase/migrations/verify_llm_usage_read_model.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btc-agent/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: btc-agent/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
  cloudflare:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btc-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node deploy/cloudflare/r2-gateway/worker.test.mjs
