name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: btc-agent}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: btc-agent/go.mod, cache-dependency-path: btc-agent/go.sum}
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/agent .
      - run: ./scripts/check-secrets.sh
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: {POSTGRES_PASSWORD: postgres}
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - run: for f in btc-agent/supabase/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done
        env: {DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/postgres'}
  frontend:
    if: ${{ hashFiles('btc-agent/web/package-lock.json') != '' }}
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: btc-agent/web}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: btc-agent/web/package-lock.json}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test --if-present
      - run: npm run build
