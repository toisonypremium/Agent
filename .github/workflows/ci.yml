name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btc-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: btc-agent/go.mod
          cache: true
      - run: gofmt -d .
      - run: go test -count=1 ./...
      - run: go vet ./...
      - run: go build -trimpath -o /tmp/btc-agent .
