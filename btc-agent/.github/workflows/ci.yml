name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: btc-agent}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: btc-agent/go.mod, cache-dependency-path: btc-agent/go.sum}
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest && staticcheck ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - run: go test -race -count=1 ./...
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/agent .
      - run: ./bin/agent config-check --config config.yaml.example
      - run: ./scripts/check-secrets.sh
      - run: bash deploy/test-immutable-backup.sh
      - run: bash deploy/test-immutable-health-check.sh
      - run: bash deploy/test-immutable-runtime.sh
      - run: bash deploy/test-immutable-runtime-verify.sh
      - run: bash deploy/test-immutable-user-release.sh
