name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: btc-agent}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25.12', cache-dependency-path: btc-agent/go.sum}
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0 && staticcheck ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && govulncheck ./...
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-go-${{ github.sha }}
          path: btc-agent/coverage.out
          if-no-files-found: warn
          retention-days: 30
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/agent .
      - run: ./bin/agent config-check --config config.yaml.example
      - run: bash scripts/check-secrets.sh
      - run: bash deploy/test-immutable-backup.sh
      - run: bash deploy/test-immutable-health-check.sh
      - run: bash deploy/test-immutable-runtime.sh
      - run: bash deploy/test-immutable-runtime-verify.sh
      - run: bash deploy/test-immutable-user-release.sh
      - run: bash deploy/test-web-console-release.sh
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/web-console ./cmd/web-console
  web:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: btc-agent/web}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '22.16.0', cache: npm, cache-dependency-path: btc-agent/web/package-lock.json}
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run build
